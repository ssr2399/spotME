<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="spotME — AI-powered real-time crowd navigation and safety concierge for sporting venues. Built with Gemini AI, Firebase, and Google Maps." />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://maps.google.com https://www.google.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://api.open-meteo.com https://generativelanguage.googleapis.com https://*.google-analytics.com; img-src 'self' data: https://*.googleapis.com https://*.gstatic.com;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>spotME — Smart Event Concierge</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('unhandledrejection', function(e) {
        var msg = String(e.reason && e.reason.message || e.reason || '');
        if (msg.indexOf('API key') !== -1 || msg.indexOf('config-fetch') !== -1 || msg.indexOf('installations') !== -1 || msg.indexOf('api-key') !== -1) {
          e.preventDefault();
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
